services:
  redis:
    image: redis:alpine
    container_name: vinis-redis
    restart: unless-stopped
    # Mapeamento removido pois a VPS já tem Redis na 6379
    # ports:
    #   - "6379:6379"

  vinis-api:
    build: .
    container_name: vinis-api
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/app/logs
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - ./.baileys_auth:/app/.baileys_auth
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
