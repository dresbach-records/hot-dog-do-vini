server {
    listen 80;
    server_name hotdogdovini.com.br www.hotdogdovini.com.br;

    # Redirecionamento para HTTPS (habilitar após Certbot)
    # return 301 https://$host$request_uri;

    root /var/www/hotdogdovini/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para API se necessário (opcional, já temos subdomínio api.)
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Logs
    access_log /var/log/nginx/hotdog_access.log;
    error_log /var/log/nginx/hotdog_error.log;
}
