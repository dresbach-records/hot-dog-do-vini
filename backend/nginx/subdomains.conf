# Configuração de Subdomínios - Vini's Cloud

# ERP - Administrativo
server {
    listen 80;
    server_name erp.hotdogdovini.com.br;

    root /var/www/hotdogdovini/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/erp_access.log;
    error_log /var/log/nginx/erp_error.log;
}

# Área do Cliente / Portal
server {
    listen 80;
    server_name cliente.hotdogdovini.com.br;

    root /var/www/hotdogdovini/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/cliente_access.log;
    error_log /var/log/nginx/cliente_error.log;
}

# Checkout - Finalização de Pedidos
server {
    listen 80;
    server_name checkout.hotdogdovini.com.br;
    root /var/www/hotdogdovini/dist;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}

# Confirmação - Sucesso de Pedido
server {
    listen 80;
    server_name confirmacao.hotdogdovini.com.br;
    root /var/www/hotdogdovini/dist;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}

# Redireciona - Links Curtos/Mkt
server {
    listen 80;
    server_name redireciona.hotdogdovini.com.br;
    root /var/www/hotdogdovini/dist;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}

# Webhook - iFood Integration (Industrial)
server {
    listen 80;
    server_name webhook.hotdogdovini.com.br;

    location / {
        proxy_pass http://localhost:3001/ifood/webhook;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_header X-Ifood-Signature;
    }
}

# Pagar.me - Gateways de Pagamento
server {
    listen 80;
    server_name pagarme.hotdogdovini.com.br;
    location / {
        proxy_pass http://localhost:3001/api/pagarme/webhook;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
